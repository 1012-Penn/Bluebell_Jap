version: '3'

services:
  app:
    build: .
    ports:
      - "8084:8084"
    depends_on:
      - mysql
      - redis
    environment:
      - MYSQL_HOST=mysql
      - REDIS_HOST=redis
    networks:
      - bluebell-network

  mysql:
    image: mysql:8.0
    container_name: bluebell-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: bluebell
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - bluebell-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  redis:
    image: redis:6.2-alpine
    container_name: bluebell-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - bluebell-network

networks:
  bluebell-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
